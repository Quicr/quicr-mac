excluded:
  - dependencies
  - Decimus/Views/VideoView.swift
  - Decimus/Views/Components/PreviewView.swift
analyzer_rules:
  - unused_import

type_body_length:
  warning: 750
  error: 1000
file_length:
  warning: 750
  error: 1000
line_length:
  warning: 150
  error: 200
identifier_name:
  min_length:
    warning: 1
function_body_length:
  warning: 75
  error: 150
function_parameter_count:
  warning: 7
  error: 10
cyclomatic_complexity:
  ignores_case_statements: true
